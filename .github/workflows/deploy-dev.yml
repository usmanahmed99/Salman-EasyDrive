name: Deploy Dev

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker + Pages (dev)
    # Dev environment holds the CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID
    # secrets for the existing (non-client) Cloudflare account.
    environment: development
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # Apply D1 migrations BEFORE deploying the Worker, so the schema is never behind
      # the code (deploying first would 500 on any new table/column until this ran).
      # Idempotent: wrangler skips migrations already recorded as applied.
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply easy-driving-booking --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Default (top-level) wrangler env — easydriving.nextiadriveops.com.
      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Pages
        run: npx wrangler pages deploy dist --project-name=easy-driving-booking --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
